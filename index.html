<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONCLAD</title>
<style>
  html,body{margin:0;height:100%;background:#0a0a0e;overflow:hidden;font-family:'Courier New',monospace;color:#c9b98a}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;box-shadow:0 0 40px #000}
  #hint{position:fixed;left:8px;bottom:6px;font-size:12px;opacity:.5;letter-spacing:1px}
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="480" height="270"></canvas></div>
<div id="hint">Move · Shift DODGE · J light · K heavy · ↑+K launcher · I grab · L/Space block(PARRY) · U shield-throw · O Art · R restart</div>
<script>
(() => {
  "use strict";
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = 480, H = 270;
  function resize(){ const s=Math.max(1,Math.min(Math.floor(innerWidth/W),Math.floor(innerHeight/H))||1); cv.style.width=(W*s)+'px'; cv.style.height=(H*s)+'px'; }
  addEventListener('resize', resize); resize();

  const FLOOR_TOP=168, FLOOR_BOT=250, WORLD_LEN=2450;
  const depthScale = y => 0.82 + (y-FLOOR_TOP)/(FLOOR_BOT-FLOOR_TOP)*0.30;
  const F=1/60;
  const _sc={};
  function shade(hex,d){ const key=hex+d; if(_sc[key]) return _sc[key]; const n=parseInt(hex.slice(1),16);
    let r=(n>>16)+d,g=((n>>8)&255)+d,b=(n&255)+d; r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return _sc[key]='#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }

  const keys={}, pressed={};
  const MOVE={ ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right',ArrowUp:'up',KeyW:'up',ArrowDown:'down',KeyS:'down' };
  const SYS={ Escape:'pause',KeyP:'pause',Enter:'confirm',KeyR:'reset',Digit1:'opt1',Digit2:'opt2',Digit3:'opt3' };
  let BIND={ light:'KeyJ', heavy:'KeyK', grab:'KeyI', block:'KeyL' };
  let rebinding=null;
  function mapCode(code){ if(MOVE[code]) return MOVE[code]; if(code==='Space') return 'block'; if(code==='ShiftLeft'||code==='ShiftRight') return 'dodge'; if(code==='KeyU') return 'sthrow'; if(code==='KeyO') return 'art'; for(const a in BIND) if(BIND[a]===code) return a; if(SYS[code]) return SYS[code]; return null; }
  addEventListener('keydown', e=>{
    audioInit();
    if(rebinding){ if(e.code!=='Escape'&&!MOVE[e.code]&&e.code!=='Space'){ BIND[rebinding]=e.code; saveCfg(); } rebinding=null; e.preventDefault(); return; }
    const a=mapCode(e.code); if(!a) return; e.preventDefault(); if(!keys[a]) pressed[a]=true; keys[a]=true;
  });
  addEventListener('keyup', e=>{ const a=mapCode(e.code); if(a) keys[a]=false; });

  const ATT={
    light1:{startup:4,active:4,recover:7,dmg:5,kb:2.2,reach:34,next:'light2'},
    light2:{startup:4,active:4,recover:8,dmg:5,kb:2.4,reach:34,next:'light3'},
    light3:{startup:5,active:5,recover:14,dmg:9,kb:5.0,reach:36,next:null},
    heavy:{startup:11,active:5,recover:20,dmg:16,kb:7.5,reach:40,next:null},
    grab:{startup:6,active:4,recover:18,dmg:14,kb:9.0,reach:26,next:null,throw:true},
    gswing:{startup:5,active:5,recover:18,dmg:8,kb:5.0,reach:38,next:null},
    gcleave:{startup:16,active:6,recover:26,dmg:22,kb:11,reach:46,next:null},
    gpoke:{startup:8,active:4,recover:14,dmg:9,kb:4.0,reach:60,next:null},
    dashatk:{startup:3,active:5,recover:16,dmg:12,kb:8.5,reach:38,next:null},
    launch:{startup:8,active:5,recover:22,dmg:11,kb:3.0,reach:34,next:null,launch:true},
  };
  const PARRY_FRAMES=8;

  const ARCH={
    grunt:{hp:70,spd:1.15,size:1.0,swing:'gswing',tele:24,canBlock:0.40,armor:false,tough:false,keep:0,weapon:'sword',
      build:{helm:'pot',shield:'buckler',pauld:'strap',bulk:0.92},
      pal:{armor:'#8a5233',trim:'#c48a4e',dark:'#3c2417',skin:'#c99a6a',plume:'#7a7a7a',weap:'#d8d2c4'}},
    berserker:{hp:110,spd:1.0,size:1.18,swing:'gcleave',tele:40,canBlock:0,armor:true,tough:false,keep:0,weapon:'cleave',
      build:{helm:'horns',bare:true,pauld:'spike',shield:null,bulk:1.30},
      pal:{armor:'#6e2b2b',trim:'#b0413a',dark:'#2a0f0f',skin:'#c08a5a',plume:'#e0b020',weap:'#c9c2b4'}},
    spearman:{hp:60,spd:1.35,size:1.0,swing:'gpoke',tele:18,canBlock:0,armor:false,tough:false,keep:56,weapon:'spear',
      build:{helm:'cone',shield:'round',pauld:'strap',bulk:0.84},
      pal:{armor:'#3f6b4a',trim:'#6ea87b',dark:'#1c3325',skin:'#c99a6a',plume:'#c9b04f',weap:'#cfd6d2'}},
    shieldbreaker:{hp:130,spd:0.9,size:1.14,swing:'gswing',tele:28,canBlock:0.6,armor:true,tough:true,keep:0,weapon:'sword',
      build:{helm:'great',shield:'tower',pauld:'heavy',bulk:1.22},
      pal:{armor:'#5a5f6b',trim:'#98a0ac',dark:'#25282f',skin:'#c99a6a',plume:'#8a3a3a',weap:'#e6ecf5'}},
    captain:{hp:200,spd:1.35,size:1.22,swing:'gcleave',tele:22,canBlock:0.5,armor:true,tough:false,keep:0,weapon:'cleave',boss:true,
      build:{helm:'wing',cape:'#6a2f7a',shield:'ornate',pauld:'ornate',bulk:1.14,gold:true},
      pal:{armor:'#5a3f7a',trim:'#caa6f0',dark:'#241634',skin:'#d0a070',plume:'#e6c030',weap:'#efe6ff'}},
  };

  // ---- Stage script: gates trigger screen-lock encounters ----
  function buildStage(){ return [
    {x:520,  waves:[['grunt','grunt']],                         reward:true, started:false, done:false},
    {x:1040, waves:[['grunt','spearman'],['grunt','grunt']],    reward:true, started:false, done:false},
    {x:1580, waves:[['shieldbreaker','grunt'],['berserker','spearman']], reward:true, started:false, done:false},
    {x:2180, waves:[['captain','grunt','grunt']], boss:true,    reward:false, started:false, done:false},
  ]; }

  const UPGRADES=[
    {k:'Vigor',      d:'+25 max health, full heal', ap:p=>{p.maxhp+=25; p.hp=p.maxhp;}},
    {k:'Riposte',    d:'Parry restores 10 health',  ap:p=>{p.parryHeal=(p.parryHeal||0)+10;}},
    {k:'Longsword',  d:'+7 attack reach',           ap:p=>{p.reachBonus=(p.reachBonus||0)+7;}},
    {k:'Swiftness',  d:'+20% move speed',           ap:p=>{p.spd*=1.2;}},
    {k:'Leech',      d:'Throws heal 12 health',      ap:p=>{p.grabHeal=(p.grabHeal||0)+12;}},
    {k:'Ironheart',  d:'Take 20% less damage',       ap:p=>{p.dmgMult=(p.dmgMult||1)*0.8;}},
    {k:'Executioner',d:'+40% heavy damage',          ap:p=>{p.heavyMult=(p.heavyMult||1)*1.4;}},
  ];
  const RELICS=[
    {k:'Thornmail',   d:'Attackers take 4 damage',      relic:1, ap:p=>{p.thorns=(p.thorns||0)+4;}},
    {k:'Storm Parry', d:'Parries deal 16 damage',       relic:1, ap:p=>{p.stormparry=(p.stormparry||0)+16;}},
    {k:'War Battery', d:'Valor builds 60% faster',      relic:1, ap:p=>{p.valorMult=(p.valorMult||1)*1.6;}},
    {k:'Reaper',      d:'Execute foes under 15% HP',     relic:1, ap:p=>{p.reaper=1;}},
    {k:'Bloodthirst', d:'+35 max HP, full heal',         relic:1, ap:p=>{p.maxhp+=35;p.hp=p.maxhp;}},
  ];
  const ELITES={
    warded:{tag:'WARDED', aura:'#6ec6ef', mod:e=>{ e.canBlock=0.85; e.hp=Math.round(e.hp*1.4); e.maxhp=e.hp; }},
    savage:{tag:'SAVAGE', aura:'#ef6e4a', mod:e=>{ e.enrageAble=true; e.hp=Math.round(e.hp*1.2); e.maxhp=e.hp; }},
    giant: {tag:'GIANT',  aura:'#efd06e', mod:e=>{ e.armor=true; e.size*=1.28; e.hp=Math.round(e.hp*1.9); e.maxhp=e.hp; }},
  };
  function makeElite(e,type){ const el=ELITES[type]; if(!el||!e) return e; e.elite=type; e.eliteAura=el.aura; e.eliteTag=el.tag; el.mod(e); return e; }

  function makeFighter(o){
    return { x:o.x,y:o.y,face:o.face,isPlayer:!!o.isPlayer,type:o.type||'player',boss:!!o.boss,
      hp:o.hp,maxhp:o.hp,name:o.name,pal:o.pal,size:o.size||1,
      spd:o.spd||1.7,swing:o.swing,tele:o.tele||24,canBlock:o.canBlock||0,armor:!!o.armor,tough:!!o.tough,keep:o.keep||0,weapon:o.weapon||'sword',build:o.build||null,
      vx:0,vy:0,state:'idle',att:null,attT:0,attHit:false,combo:null,comboBuf:0,
      hitStun:0,stunT:0,downT:0,invul:0,flash:0,deadT:0,parryWindow:0,blockT:0,think:0,telegraph:0,
      reachBonus:0,parryHeal:0,grabHeal:0,dmgMult:1,heavyMult:1,
      z:0,zv:0,dashT:0,tapDir:0,tapT:0,valor:0,artT:0,
      rollT:0,hasShield:true,shieldCd:0,squash:0,
      thorns:0,stormparry:0,valorMult:1,reaper:0, elite:null,eliteAura:null,eliteTag:null,enrageAble:false,enraged:false };
  }

  let player, enemies, hitstop, shake, msg, msgT, msgCol, game;
  const shots=[], props=[], pickups=[];

  function spawnEnemy(type,x,y){
    const a=ARCH[type]; if(!a) return;
    const e=makeFighter({type,name:type.toUpperCase(),face:-1,boss:a.boss,
      x:x!=null?x:game.camX+W+20, y:y!=null?y:FLOOR_TOP+20+Math.random()*(FLOOR_BOT-FLOOR_TOP-30),
      hp:a.hp,pal:a.pal,size:a.size,spd:a.spd,swing:a.swing,tele:a.tele,canBlock:a.canBlock,armor:a.armor,tough:a.tough,keep:a.keep,weapon:a.weapon,build:a.build});
    enemies.push(e); return e;
  }

  function reset(mode){
    mode=mode||'campaign';
    player=makeFighter({x:60,y:225,face:1,isPlayer:true,hp:100,name:'KNIGHT',weapon:'sword',
      build:{helm:'crest',cape:'#c94f4f',shield:'kite',pauld:'plate',bulk:1.0},
      pal:{armor:'#5b7fb0',trim:'#a9c6ef',dark:'#2c3f5e',skin:'#d9a978',plume:'#c94f4f',weap:'#e6ecf5'}});
    enemies=[];
    game={ state:'play', camX:0, progressWall:0, lock:false, gateIdx:0, waveIdx:0, stage:buildStage(), lives:3, choices:[], goPulse:0, score:0, bigFlash:0, combo:0, comboT:0, punch:0, nameCard:null, mode, wave:0 };
    shots.length=0; pickups.length=0; props.length=0;
    hitstop=0; shake=0; msg=''; msgT=0; msgCol='#e8dcc0';
    if(mode==='endless'){ player.x=W/2; game.lock=true; startEndlessWave(); }
    else { [300,470,760,1080,1360,1720,2020].forEach((bx,i)=> props.push({x:bx,y:FLOOR_TOP+18+(i%3)*24,broken:0,t:0})); banner('STAGE 1 — THE OUTER WARD','#e8dcc0'); msgT=90; }
  }
  function startEndlessWave(){ game.wave++; game.lock=true; game.camX=0; game.progressWall=0;
    const n=game.wave, count=Math.min(6, 2+Math.floor(n/2));
    const pool=['grunt','grunt','spearman']; if(n>=2)pool.push('shieldbreaker'); if(n>=3)pool.push('berserker'); if(n>=5)pool.push('captain');
    for(let i=0;i<count;i++){ const t=pool[Math.floor(Math.random()*pool.length)]; const e=spawnEnemy(t, W-40+i*30, FLOOR_TOP+20+((i*37)%(FLOOR_BOT-FLOOR_TOP-30)));
      if(n>=3 && Math.random()<0.28){ const ks=Object.keys(ELITES); makeElite(e, ks[Math.floor(Math.random()*ks.length)]); } }
    banner('WAVE '+n, '#e6c030');
  }
  enemies=[]; game={camX:0}; reset();

  const bodyHalfW=11, depthTol=20;
  function frontX(f){ return f.x+f.face*12; }
  function fx(t,x,y,col,n){ hitstop=Math.max(hitstop,t); spark(x,y,col,n); }
  function banner(t,col){ if(t){ msg=t; msgT=45; msgCol=col||'#e8dcc0'; } }
  function gainValor(f,a){ if(f.isPlayer) f.valor=Math.min(100,f.valor+a*(f.valorMult||1)); }
  function artHit(f,e){ e.hp-=8; e.flash=6; e.vx=(Math.sign(e.x-f.x)||1)*3;
    if(e.state!=='air'){ e.state='hit'; e.hitStun=8; e.att=null; e.telegraph=0; e.blockT=0; }
    spark(e.x,e.y-16-(e.z||0),'#e6c030',6); addCombo();
    if(e.hp<=0){ e.hp=0; e.state='dead'; e.deadT=0; SFX.death(); game.score+=100; game.bigFlash=8; } }

  function reachOf(att,dat){ return dat.reach + (att.isPlayer?att.reachBonus:0); }
  function targetsOf(att,reach){
    const hx=att.x+att.face*(12+reach*0.5), half=reach*0.5+bodyHalfW+4;
    const hit=t=>t.state!=='dead'&&Math.abs(t.x-hx)<=half&&Math.abs(t.y-att.y)<=depthTol;
    if(att.isPlayer) return enemies.filter(hit);
    return hit(player)?[player]:[];
  }

  function resolveHit(att,tgt,dat){
    if(tgt.state==='dead'||tgt.state==='down'||tgt.invul>0) return;
    // airborne target → juggle (can't block in the air)
    if(tgt.state==='air'){
      const jd=Math.round(dat.dmg*1.1); tgt.hp-=jd; tgt.zv=Math.max(tgt.zv,3.4); tgt.vx=(Math.sign(tgt.x-att.x)||att.face)*2; tgt.flash=6;
      fx(6,frontX(att),tgt.y-16-tgt.z,'#ffd66b',10); shake=Math.max(shake,4); SFX.hit(false); if(att.isPlayer){ gainValor(att,3); addCombo(); }
      if(tgt.hp<=0){ tgt.hp=0; tgt.state='dead'; tgt.deadT=0; SFX.death(); if(att.isPlayer){ game.score+=100; game.bigFlash=8; } }
      return;
    }
    const facingAtt=Math.sign(att.x-tgt.x)===tgt.face||att.x===tgt.x;
    if(tgt.state==='block'&&facingAtt){
      if(tgt.isPlayer&&tgt.parryWindow>0){
        att.state='stagger'; att.stunT=34; att.att=null; att.telegraph=0; att.vx=Math.sign(att.x-tgt.x||-tgt.face)*2; tgt.parryWindow=0; tgt.flash=3;
        if(tgt.parryHeal) tgt.hp=Math.min(tgt.maxhp,tgt.hp+tgt.parryHeal); gainValor(tgt,34);
        if(tgt.stormparry){ att.hp-=tgt.stormparry; if(att.hp<=0){ att.hp=0; att.state='dead'; att.deadT=0; SFX.death(); game.score+=att.elite?250:100; game.bigFlash=8; } }
        fx(11,frontX(tgt),tgt.y-16,'#ffffff',18); shake=Math.max(shake,6); SFX.parry(); banner('PARRY!','#dff0ff'); return;
      }
      tgt.vx+=Math.sign(tgt.x-att.x||att.face)*(dat.kb*0.35); tgt.flash=4; fx(3,frontX(att),att.y-16,'#cfe0ff',6); shake=Math.max(shake,2); SFX.block(); return;
    }
    // uppercut launcher → airborne (armored/boss are too heavy to launch)
    if(dat.launch && !tgt.boss && !tgt.armor){
      const dmg=Math.round(dat.dmg*(tgt.isPlayer?tgt.dmgMult:1)); tgt.hp-=dmg;
      tgt.state='air'; tgt.zv=6.2; tgt.z=0.1; tgt.vx=(Math.sign(tgt.x-att.x)||att.face)*1.5; tgt.flash=6; tgt.att=null; tgt.telegraph=0; tgt.blockT=0;
      fx(8,frontX(att),att.y-24,'#ffe0a0',12); shake=Math.max(shake,5); SFX.hit(true); if(att.isPlayer){ gainValor(att,5); addCombo(); }
      if(tgt.hp<=0){ tgt.hp=0; tgt.state='dead'; tgt.deadT=0; SFX.death(); if(att.isPlayer){ game.score+=100; game.bigFlash=8; } }
      return;
    }
    const light=dat.dmg<=6;
    let dmg=dat.dmg*(tgt.state==='stagger'?1.6:1);
    if(att.isPlayer&&att.att==='heavy') dmg*=att.heavyMult;
    if(att.enraged) dmg*=1.3;
    if(tgt.isPlayer) dmg*=tgt.dmgMult;
    if(tgt.tough&&light) dmg=Math.max(1,dmg*0.2);
    dmg=Math.round(dmg);
    const interrupt=!(tgt.armor&&dat.dmg<12);
    const dir=Math.sign(tgt.x-att.x)||att.face;
    tgt.hp-=dmg; tgt.flash=6;
    if(tgt.isPlayer&&tgt.thorns&&att.state!=='dead'){ att.hp-=tgt.thorns; spark(att.x,att.y-16,'#8ab0ef',5); if(att.hp<=0){ att.hp=0; att.state='dead'; att.deadT=0; SFX.death(); game.score+=att.elite?250:100; game.bigFlash=8; } }
    if(interrupt){ tgt.vx=dir*dat.kb; tgt.state='hit'; tgt.hitStun=dmg>12?16:10; tgt.invul=6; tgt.att=null; tgt.telegraph=0; tgt.blockT=0; }
    else { tgt.vx+=dir*dat.kb*0.25; if(tgt.tough&&light) fx(2,frontX(att),att.y-16,'#c9d2e0',4); }
    if(att.isPlayer&&att.reaper&&tgt.hp>0&&!tgt.boss&&tgt.hp<=tgt.maxhp*0.15){ tgt.hp=0; spark(tgt.x,tgt.y-16,'#c02020',12); }
    fx(dmg>12?9:6,frontX(att),att.y-16,tgt.state==='stagger'?'#ff9a4b':'#ffd66b',dmg>12?14:8); shake=Math.max(shake,dmg>12?6:3.5); SFX.hit(dmg>12); if(att.isPlayer){ gainValor(att,4); addCombo(); }
    if(tgt.hp<=0){ tgt.hp=0; tgt.state='dead'; tgt.deadT=0; tgt.vx=dir*4; fx(12,tgt.x,tgt.y-16,'#ffd66b',16); shake=8; SFX.death(); if(att.isPlayer){ game.score+=tgt.boss?500:(tgt.elite?250:100); game.bigFlash=8; } if(tgt.boss){ hitstop=Math.max(hitstop,26); game.punch=1; shake=12; } }
  }
  function tryHit(att,dat){ const r=reachOf(att,dat); for(const t of targetsOf(att,r)) resolveHit(att,t,dat); if(att.isPlayer) breakProps(att,r); }
  function breakProps(att,r){ const hx=att.x+att.face*(12+r*0.5), half=r*0.5+14;
    for(const pr of props){ if(pr.broken) continue; if(Math.abs(pr.x-hx)<=half&&Math.abs(pr.y-att.y)<=depthTol){ pr.broken=1; pr.t=0;
      for(let k=0;k<10;k++) parts.push({x:pr.x+(Math.random()-.5)*10,y:pr.y-8-Math.random()*10,vx:(Math.random()-.5)*4,vy:-Math.random()*3,life:16+Math.random()*8,col:k%2?'#8a6a3a':'#5a4326'});
      shake=Math.max(shake,4); SFX.hit(false); if(Math.random()<0.55) pickups.push({x:pr.x,y:pr.y,vy:-2.4,t:0}); } } }
  function tryGrab(att,dat){
    const r=reachOf(att,dat); const t=targetsOf(att,r)[0];
    if(!t||t.state==='dead'||t.state==='down'||t.invul>0) return;
    const dir=att.face; t.hp-=dat.dmg; t.vx=dir*dat.kb; t.state='down'; t.downT=0; t.stunT=44; t.flash=6; t.att=null; t.blockT=0; t.telegraph=0;
    if(att.isPlayer&&att.grabHeal) att.hp=Math.min(att.maxhp,att.hp+att.grabHeal); if(att.isPlayer){ gainValor(att,8); addCombo(); }
    fx(10,t.x,t.y-18,'#ffd66b',12); shake=Math.max(shake,7); SFX.grab(); banner(att.isPlayer?'THROW!':'','#ffe0a0');
    if(t.hp<=0){ t.hp=0; t.state='dead'; t.deadT=0; SFX.death(); if(att.isPlayer){ game.score+=t.boss?500:100; game.bigFlash=8; } }
  }

  const parts=[];
  function spark(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,s=1+Math.random()*3; parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:12+Math.random()*10,col}); } }
  function startAttack(f,name){ const dat=ATT[name]; f.state='attack'; f.att=name; f.attT=0; f.attHit=false; f.vx*=0.3; f.combo=dat.next; f.comboBuf=0; if(!dat.throw) SFX.swing(); }
  function addCombo(){ game.combo++; game.comboT=90; }

  // ---- shield throw (boomerang projectile, cooldown) ----
  const SHIELD_RANGE=180;
  function throwShield(f){ f.hasShield=false; f.shieldCd=0; SFX.swing();
    shots.push({x:f.x+f.face*10, y:f.y, vx:f.face*7, spin:0, owner:f, phase:'out', dist:0, hit:new Set()});
    if(f.isPlayer) banner('SHIELD THROW!','#a9c6ef'); }
  function shieldHit(owner,e,s){ if(e.state==='dead'||e.state==='down'||e.invul>0) return;
    e.hp-=10; e.flash=6; e.vx=Math.sign(s.vx||owner.face)*4;
    if(e.state!=='air'&&!e.armor){ e.state='hit'; e.hitStun=10; e.att=null; e.telegraph=0; e.blockT=0; }
    fx(4,e.x,e.y-16-(e.z||0),'#cfe0ff',8); shake=Math.max(shake,3); SFX.block();

  function updateShots(){

      if(f.z<=0){ f.z=0; f.state='down'; f.downT=0; f.stunT=26; f.vx*=0.4; f.squash=8; for(let k=0;k<7;k++) parts.push({x:f.x+(Math.random()-.5)*12,y:f.y,vx:(Math.random()-.5)*3,vy:-Math.random()*1.5,life:14,col:'#6a5a44'}); } clampPos(f); return; }
    if(f.state==='art'){ f.artT++; f.invul=3; f.vx*=0.8; f.x+=f.vx;
      if(f.artT%5===0){ for(const e of enemies){ if(e.state==='dead'||e.state==='down') continue; if(Math.abs(e.x-f.x)<50&&Math.abs(e.y-f.y)<depthTol+10) artHit(f,e); } }

    if(f.state==='attack'){

        if(f.tapDir===d&&f.tapT>0){ f.state='dash'; f.dashT=0; f.face=d; f.vx=d*4.6; f.invul=11; f.tapT=0; SFX.swing(); return; }
        f.tapDir=d; f.tapT=13; }
      if(pressed.dodge){ const d=(keys.left?-1:keys.right?1:-f.face); if(keys.left||keys.right) f.face=(keys.right?1:-1); f.state='roll'; f.rollT=0; f.vx=d*4.3; f.invul=18; SFX.swing(); return; }

      if(pressed.sthrow && f.hasShield && f.shieldCd<=0){ throwShield(f); return; }

      if(pressed.light){ startAttack(f,'light1'); return; }

      let mx=(keys.right?1:0)-(keys.left?1:0), my=(keys.down?1:0)-(keys.up?1:0);
      f.vx=mx*f.spd; f.vy=my*f.spd*0.72; if(mx) f.face=mx; f.x+=f.vx; f.y+=f.vy; f.state=(mx||my)?'walk':'idle'; clampPos(f);

  function updateAI(f){
    const p=player; if(p.state==='dead'){ f.state='idle'; f.vx=0; return; }
    if(f.enrageAble&&!f.enraged&&f.hp<f.maxhp*0.4){ f.enraged=true; f.spd*=1.45; f.tele=Math.max(10,f.tele-6); f.eliteAura='#ff2010'; banner('SAVAGE ENRAGED!','#ff6a4a'); }
    const dx=p.x-f.x, dy=p.y-f.y, adx=Math.abs(dx), ady=Math.abs(dy); f.face=dx>=0?1:-1;
    if(f.blockT>0){ f.blockT--; f.state='block'; f.vx*=0.5; f.x+=f.vx; clampPos(f); return; }
    if(f.telegraph>0){ f.telegraph--; f.vx*=0.6; f.x+=f.vx; f.state='windup'; if(f.telegraph===0) startAttack(f,f.swing); clampPos(f); return; }
    f.think--;
    if(f.canBlock&&p.state==='attack'&&adx<48&&ady<depthTol+6&&f.think<=0&&Math.random()<f.canBlock){ f.blockT=20; f.think=48; f.vx=0; clampPos(f); return; }
    if(f.keep>0){
      if(adx<f.keep-10&&f.think<=0){ const away=-Math.sign(dx)||1; f.vx=away*f.spd; f.x+=f.vx; f.vy=(ady>10?Math.sign(dy):0)*f.spd*0.7; f.y+=f.vy; f.state='walk'; clampPos(f); return; }
      if(adx<f.keep+8&&ady<depthTol&&f.think<=0){ f.telegraph=f.tele; f.think=70; f.vx=0; clampPos(f); return; }
    } else if(adx<40&&ady<depthTol&&f.think<=0){ f.telegraph=f.tele; f.think=60; f.vx=0; clampPos(f); return; }
    const reach=f.keep>0?f.keep:28;
    const mvx=adx>reach?Math.sign(dx):0, mvy=ady>10?Math.sign(dy):0;
    f.vx=mvx*f.spd; f.vy=mvy*f.spd*0.7; f.x+=f.vx; f.y+=f.vy; f.state=(mvx||mvy)?'walk':'idle'; if(f.think<0) f.think=0; clampPos(f);
  }

  function livingFoes(){ return enemies.filter(e=>e.state!=='dead').length; }

  function updateStage(){
    const g=game;
    if(g.mode==='endless'){
      if(g.lock && livingFoes()===0 && enemies.every(e=>e.state!=='dead'||e.deadT>18)){
        if(g.wave%3===0) offerUpgrade(); else startEndlessWave();
      }
      return;
    }
    // trigger next gate when player crosses it
    if(!g.lock && g.gateIdx<g.stage.length){
      const gate=g.stage[g.gateIdx];
      if(!gate.started && player.x>=gate.x){
        gate.started=true; g.lock=true; g.waveIdx=0; g.progressWall=g.camX;
        spawnWave(gate.waves[0]);
        banner(gate.boss?'BOSS — THE CASTELLAN':'AMBUSH!', gate.boss?'#e6c030':'#e5a9a9');
      }
    }
    // during a lock, manage waves
    if(g.lock){
      const gate=g.stage[g.gateIdx];
      if(livingFoes()===0 && enemies.every(e=>e.deadT>20 || e.state!=='dead')){
        g.waveIdx++;
        if(g.waveIdx<gate.waves.length){ spawnWave(gate.waves[g.waveIdx]); }
        else {
          g.lock=false; gate.done=true; g.progressWall=gate.x-40;
          if(gate.boss){ g.state='clear'; banner('CASTLE CLEARED — press R','#a9e5a9'); msgT=999; SFX.win(); }
          else if(gate.reward){ offerUpgrade(); }
          g.gateIdx++;
        }
      }
    }
  }
  function spawnWave(list){ list.forEach((t,i)=>{ const e=spawnEnemy(t, game.camX+W-30+i*34, FLOOR_TOP+24+i*22);
    if(e&&e.boss){ game.nameCard={t:0,name:'THE CASTELLAN',sub:'Warden of the Keep'}; game.punch=1; }

  function offerUpgrade(){
    const up=UPGRADES.slice(), rl=RELICS.slice(), pick=[];

    if(rl.length) pick.push(rl.splice(Math.floor(Math.random()*rl.length),1)[0]);

    if(game.lock) return; // frozen during fights

  function step(dt){

      if(i>=0 && game.choices[i]){ game.choices[i].ap(player); banner(game.choices[i].k+' gained','#a9e5a9'); game.state='play'; if(game.mode==='endless') startEndlessWave(); }
      if(pressed.reset) reset(game.mode);
      clearPressed(); return;
    }
    if(game.state==='gameover'||game.state==='clear'){ if(pressed.reset) reset(game.mode); clearPressed(); if(msgT<900) msgT=999; return; }

    if(hitstop>0){ hitstop--; for(const pt of parts){ pt.x+=pt.vx*0.2; pt.y+=pt.vy*0.2; } clearPressed(); return; }

    updateFighter(player,dt);
    for(const e of enemies) updateFighter(e,dt);
    for(let i=enemies.length-1;i>=0;i--){ if(enemies[i].state==='dead'&&enemies[i].deadT>70) enemies.splice(i,1); }
    updateShots();
    for(let i=pickups.length-1;i>=0;i--){ const pk=pickups[i]; pk.t++; if(pk.vy!==0){ pk.y+=pk.vy; pk.vy+=0.22; if(pk.vy>0&&pk.t>12) pk.vy=0; }
      if(player.state!=='dead'&&Math.abs(pk.x-player.x)<16&&Math.abs(pk.y-player.y)<depthTol){ player.hp=Math.min(player.maxhp,player.hp+18); spark(pk.x,pk.y-6,'#6ee06e',12); SFX.block(); banner('+18 HP','#a9e5a9'); pickups.splice(i,1); } }
    for(let i=parts.length-1;i>=0;i--){ const pt=parts[i]; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.25; pt.life--; if(pt.life<=0) parts.splice(i,1); }

    // player death → lives / gameover
    if(player.state==='dead'&&player.deadT>50){
      game.lives--;

      else { game.state='gameover'; if(game.mode==='endless'){ if(game.wave>ENDLESS_BEST){ ENDLESS_BEST=game.wave; saveCfg(); } banner('ENDLESS — REACHED WAVE '+game.wave+' — press R','#e5a9a9'); } else banner('YOU FELL — press R','#e5a9a9'); msgT=999; }
    }

    updateStage();
    updateCamera();
    if(shake>0) shake*=0.85; if(msgT>0) msgT--; if(game.goPulse>0) game.goPulse--; if(game.bigFlash>0) game.bigFlash--; if(game.comboT>0){ game.comboT--; if(game.comboT===0) game.combo=0; }
    if(game.punch>0) game.punch*=0.88; if(game.nameCard){ game.nameCard.t++; if(game.nameCard.t>150) game.nameCard=null; }
    if(pressed.reset) reset();
    clearPressed();
  }

    o.type=type||'square'; o.frequency.value=freq; if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,actx.currentTime+dur);
    g.gain.value=gain||0.3; g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur); o.connect(g); g.connect(sfxGain); o.start(); o.stop(actx.currentTime+dur); }
  function noise(dur,gain){ if(!actx) return; const n=Math.floor(actx.sampleRate*dur),buf=actx.createBuffer(1,n,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n); const s=actx.createBufferSource(); s.buffer=buf; const g=actx.createGain(); g.gain.value=gain||0.3; s.connect(g); g.connect(sfxGain); s.start(); }
  const SFX={
    swing:()=>blip(300,0.12,'sawtooth',0.10,150),
    hit:(big)=>{ noise(big?0.18:0.1,big?0.45:0.28); blip(big?90:150,0.12,'square',0.22,60); },
    block:()=>{ blip(760,0.08,'square',0.18,520); noise(0.05,0.12); },
    parry:()=>{ blip(1200,0.16,'triangle',0.28,720); blip(1650,0.12,'sine',0.18,950); },
    grab:()=>{ blip(120,0.2,'sawtooth',0.28,50); noise(0.12,0.28); },
    death:()=>blip(200,0.4,'sawtooth',0.28,40),
    select:()=>blip(520,0.06,'square',0.18,720),
    win:()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>blip(f,0.22,'triangle',0.24),i*130)),
  };
  const BASS=[110,110,146.8,130.8], ARP=[440,523,659,523];
  function mnote(freq,dur,type,gain){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain(); o.type=type; o.frequency.value=freq;
    g.gain.value=0; g.gain.linearRampToValueAtTime(gain,actx.currentTime+0.02); g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur); o.connect(g); g.connect(musicGain); o.start(); o.stop(actx.currentTime+dur+0.02); }
  function startMusic(){ if(musicTimer) return; musicTimer=setInterval(()=>{ if(!actx||!cfg.musicOn) return; const t=musicStep%16;
    if(t%4===0) mnote(BASS[(musicStep>>2)%BASS.length]/2,0.34,'triangle',0.5);
    mnote(ARP[t%ARP.length]*(t%8<4?1:1.5),0.11,'square',0.12); musicStep++; },220); }

  // ---- config persistence ----
  function saveCfg(){ try{ localStorage.setItem('ironclad',JSON.stringify({cfg,BIND,hi:HISCORE,endless:ENDLESS_BEST})); }catch(e){} }
  function loadCfg(){ try{ const s=JSON.parse(localStorage.getItem('ironclad')); if(s){ if(s.cfg) Object.assign(cfg,s.cfg); if(s.BIND) Object.assign(BIND,s.BIND); if(s.hi) HISCORE=s.hi; if(s.endless) ENDLESS_BEST=s.endless; } }catch(e){} }
  loadCfg();

  // ---- scene / menu state ----
  let scene='title', menu={idx:0}, settingsFrom='title';
  const SET=['SFX Volume','Music','Rebind Light','Rebind Heavy','Rebind Grab','Rebind Block','Back'];
  const RB=['light','heavy','grab','block'];
  const keyName=c=>String(c).replace('Key','').replace('Digit','').replace('Arrow','');
  function startRun(mode){ reset(mode); scene='play'; }
  function checkHi(){ if(game.score>HISCORE){ HISCORE=game.score; saveCfg(); } }

  function update(dt){
    if(scene==='play'){
      if(pressed.pause){ scene='pause'; menu.idx=0; SFX.select(); clearPressed(); return; }
      if(game.state==='gameover'||game.state==='clear') checkHi();
      step(dt); return;
    }
    menuUpdate();
  }
  function menuUpdate(){
    const up=pressed.up,dn=pressed.down,lf=pressed.left,rt=pressed.right,ok=pressed.confirm||pressed.block||pressed.light,back=pressed.pause;
    if(scene==='title'){ const n=4; if(up)menu.idx=(menu.idx+n-1)%n; if(dn)menu.idx=(menu.idx+1)%n; if(up||dn)SFX.select();
      if(ok){ SFX.select(); if(menu.idx===0)startRun('campaign'); else if(menu.idx===1)startRun('endless'); else if(menu.idx===2)scene='controls'; else{ settingsFrom='title'; scene='settings'; menu.idx=0; } } }
    else if(scene==='controls'){ if(ok||back){ SFX.select(); scene='title'; } }
    else if(scene==='pause'){ const n=3; if(up)menu.idx=(menu.idx+n-1)%n; if(dn)menu.idx=(menu.idx+1)%n; if(up||dn)SFX.select();
      if(back) scene='play'; else if(ok){ SFX.select(); if(menu.idx===0)scene='play'; else if(menu.idx===1){ settingsFrom='pause'; scene='settings'; menu.idx=0; } else scene='title'; } }
    else if(scene==='settings'){ const n=SET.length; if(up)menu.idx=(menu.idx+n-1)%n; if(dn)menu.idx=(menu.idx+1)%n; if(up||dn)SFX.select();
      if(menu.idx===0&&(lf||rt)){ cfg.sfx=Math.max(0,Math.min(1,+(cfg.sfx+(rt?0.1:-0.1)).toFixed(2))); if(sfxGain)sfxGain.gain.value=cfg.sfx; SFX.select(); saveCfg(); }
      else if(menu.idx===1&&(lf||rt||ok)){ cfg.musicOn=!cfg.musicOn; if(musicGain)musicGain.gain.value=cfg.musicOn?cfg.music:0; saveCfg(); }
      else if(ok){ if(menu.idx>=2&&menu.idx<=5){ rebinding=RB[menu.idx-2]; SFX.select(); } else if(menu.idx===6){ SFX.select(); scene=settingsFrom; } }
      if(back) scene=settingsFrom;
    }
    clearPressed();
  }

  // ---- menu rendering ----
  function panel(x,y,w,h){ ctx.fillStyle='rgba(10,8,14,.86)'; ctx.fillRect(x,y,w,h); ctx.strokeStyle='#c9b98a'; ctx.lineWidth=1; ctx.strokeRect(x+0.5,y+0.5,w-1,h-1); }
  function logo(y){ ctx.textAlign='center'; ctx.fillStyle='#241634'; ctx.font='30px "Courier New"'; ctx.fillText('IRONCLAD',W/2+2,y+2); ctx.fillStyle='#e6c030'; ctx.fillText('IRONCLAD',W/2,y); ctx.font='9px "Courier New"'; ctx.fillStyle='#9a8f6a'; ctx.fillText('a knight against knights',W/2,y+16); ctx.textAlign='left'; }
  function opt(txt,cx,cy,sel){ ctx.textAlign='center'; ctx.fillStyle=sel?'#e6c030':'#c9b98a'; ctx.font='12px "Courier New"'; ctx.fillText((sel?'▶ ':'  ')+txt,cx,cy); ctx.textAlign='left'; }
  function renderTitle(){ const g0=ctx.createLinearGradient(0,0,0,H); g0.addColorStop(0,'#150d18'); g0.addColorStop(1,'#241a2e'); ctx.fillStyle=g0; ctx.fillRect(0,0,W,H);
    const fl=performance.now()/90; for(let x=60;x<W;x+=120){ const grd=ctx.createRadialGradient(x,58,0,x,58,42); grd.addColorStop(0,'rgba(255,160,60,'+(0.16+Math.sin(fl+x)*0.05)+')'); grd.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=grd; ctx.fillRect(x-42,16,84,84); }
    logo(84); ['START','ENDLESS','CONTROLS','SETTINGS'].forEach((o,i)=>opt(o,W/2,132+i*19,menu.idx===i));
    ctx.textAlign='center'; ctx.fillStyle='#9a8f6a'; ctx.font='8px "Courier New"'; ctx.fillText('HI-SCORE '+String(HISCORE).padStart(6,'0')+'    ENDLESS BEST  WAVE '+ENDLESS_BEST,W/2,H-24);
    if(performance.now()%1000<600){ ctx.fillStyle='#e8dcc0'; ctx.fillText('▲▼ select    ENTER confirm',W/2,H-12); } ctx.textAlign='left'; }
  function renderControls(){ ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,0,W,H); panel(74,32,332,210); ctx.textAlign='center'; ctx.fillStyle='#e6c030'; ctx.font='13px "Courier New"'; ctx.fillText('CONTROLS',W/2,52); ctx.font='9px "Courier New"'; ctx.textAlign='left';
    const rows=[['Move','Arrows / WASD'],['Dodge roll','Shift  (i-frames)'],['Dash','double-tap ◀ or ▶'],['Light attack',keyName(BIND.light)+'  (chains x3)'],['Heavy / Launcher',keyName(BIND.heavy)+'  ·  ↑+'+keyName(BIND.heavy)+' juggles'],['Grab / throw',keyName(BIND.grab)+'  (beats block)'],['Block / Parry',keyName(BIND.block)+'/Space, tap=parry'],['Shield throw','U  (boomerang, cooldown)'],["Knight's Art",'O  (spend full Valor)'],['Pause','Esc / P']];
    rows.forEach((r,i)=>{ const y=74+i*15; ctx.fillStyle='#e8dcc0'; ctx.fillText(r[0],96,y); ctx.fillStyle='#9a8f6a'; ctx.fillText(r[1],210,y); });
    ctx.textAlign='center'; ctx.fillStyle='#e6c030'; ctx.fillText('press ENTER to go back',W/2,232); ctx.textAlign='left'; }
  function overlayMenu(title,opts){ ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(0,0,W,H); panel(140,58,200,154); ctx.textAlign='center'; ctx.fillStyle='#e6c030'; ctx.font='15px "Courier New"'; ctx.fillText(title,W/2,88); ctx.textAlign='left'; opts.forEach((o,i)=>opt(o,W/2,120+i*22,menu.idx===i)); }
  function renderSettings(){ ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(0,0,W,H); panel(90,38,300,196); ctx.textAlign='center'; ctx.fillStyle='#e6c030'; ctx.font='14px "Courier New"'; ctx.fillText('SETTINGS',W/2,62); ctx.textAlign='left';
    SET.forEach((s,i)=>{ const y=86+i*19, sel=menu.idx===i; ctx.fillStyle=sel?'#e6c030':'#c9b98a'; ctx.font='11px "Courier New"'; ctx.fillText((sel?'▶ ':'  ')+s,108,y);
      if(i===0){ const bx=250,bw=100; ctx.fillStyle='#3a3a3a'; ctx.fillRect(bx,y-7,bw,7); ctx.fillStyle='#4fa04f'; ctx.fillRect(bx,y-7,bw*cfg.sfx,7); ctx.strokeStyle='#c9b98a'; ctx.strokeRect(bx+0.5,y-6.5,bw-1,6); }
      else if(i===1){ ctx.fillStyle=cfg.musicOn?'#4fa04f':'#8a4a4a'; ctx.fillText(cfg.musicOn?'ON':'OFF',258,y); }
      else if(i>=2&&i<=5){ const act=RB[i-2]; ctx.fillStyle='#9a8f6a'; ctx.fillText('['+(rebinding===act?'press key…':keyName(BIND[act]))+']',258,y); }
    });
    ctx.textAlign='center'; ctx.fillStyle='#9a8f6a'; ctx.font='8px "Courier New"'; ctx.fillText('◀▶ adjust   ENTER select   ESC back',W/2,224); ctx.textAlign='left'; }
  function drawAll(){ if(scene==='title'){ renderTitle(); return; } render(); if(scene==='pause') overlayMenu('PAUSED',['RESUME','SETTINGS','QUIT TO TITLE']); else if(scene==='controls') renderControls(); else if(scene==='settings') renderSettings(); }

  let last=performance.now(),acc=0;
  function tick(now){ let dt=now-last; last=now; if(dt>250) dt=250; acc+=dt; let steps=0; while(acc>=1000/60&&steps<6){ update(F); acc-=1000/60; steps++; } drawAll(); }
  function frame(now){ tick(now); requestAnimationFrame(frame); }
  requestAnimationFrame(frame); setInterval(()=>tick(performance.now()),1000/30);

  window.__ironclad={
    get p(){return player;}, get e(){return enemies[0];}, get enemies(){return enemies;}, get game(){return game;},
    get scene(){return scene;}, set scene(s){scene=s;}, get menu(){return menu;}, get cfg(){return cfg;}, get bind(){return BIND;},
    get props(){return props;}, get pickups(){return pickups;},
    key:(code)=>{ dispatchEvent(new KeyboardEvent('keydown',{code})); dispatchEvent(new KeyboardEvent('keyup',{code})); },
    pump:(n=1)=>{ for(let i=0;i<n;i++) update(F); },
    keys, press:(k)=>{pressed[k]=true; keys[k]=true;}, release:(k)=>{keys[k]=false;},
    step:(n=1)=>{ for(let i=0;i<n;i++) step(F); render(); },
    reset, spawn:(t,x,y)=>spawnEnemy(t,x,y),
    warp:(x)=>{ player.x=x; game.camX=Math.max(0,Math.min(WORLD_LEN-W,x-W*0.42)); },
    killAll:()=>{ enemies.forEach(e=>{e.hp=0;e.state='dead';e.deadT=80;}); },
    state:()=>({st:game.state,cam:Math.round(game.camX),lock:game.lock,gate:game.gateIdx,lives:game.lives,
      player:{x:Math.round(player.x),hp:player.hp,st:player.state},
      enemies:enemies.map(e=>({t:e.type,x:Math.round(e.x),hp:e.hp,st:e.state}))}),
    cap:()=>cv.toDataURL('image/png')
  };
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONCLAD</title>
<style>
  html,body{margin:0;height:100%;background:#0a0a0e;overflow:hidden;font-family:'Courier New',monospace;color:#c9b98a}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;box-shadow:0 0 40px #000}
  #hint{position:fixed;left:8px;bottom:6px;font-size:12px;opacity:.5;letter-spacing:1px}
  #touch{position:fixed;inset:0;pointer-events:none;z-index:10;display:none}
  #touch.on{display:block}
  .tbtn{position:absolute;pointer-events:auto;border:2px solid rgba(201,185,138,.55);background:rgba(20,16,26,.42);color:#e8dcc0;border-radius:50%;display:flex;align-items:center;justify-content:center;font:bold 11px 'Courier New',monospace;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none}
  .tbtn.on{background:rgba(230,192,48,.5);border-color:#e6c030}
  .tbtn.sm{width:46px;height:46px;font-size:9px}
  .tbtn.lg{width:62px;height:62px;font-size:12px}
  #joy{position:absolute;left:20px;bottom:26px;width:120px;height:120px;border-radius:50%;border:2px solid rgba(201,185,138,.4);background:rgba(20,16,26,.35);pointer-events:auto;touch-action:none}
  #joyknob{position:absolute;left:40px;top:40px;width:40px;height:40px;border-radius:50%;background:rgba(230,192,48,.55)}
  #touchtoggle{position:fixed;right:8px;bottom:6px;z-index:11;font:11px 'Courier New',monospace;color:#c9b98a;opacity:.5;background:rgba(20,16,26,.6);border:1px solid rgba(201,185,138,.4);border-radius:4px;padding:3px 6px;pointer-events:auto;cursor:pointer}
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="480" height="270"></canvas></div>
<div id="hint">Move · Shift DODGE · J light · K heavy · ↑+K launcher · I grab · L/Space block(PARRY) · U shield-throw · O Art · R restart</div>
<script>
(() => {
  "use strict";
  const cv = document.getElementById('c'); let ctx = cv.getContext('2d');
  // offscreen buffer for isolated painterly form-shading of a single sprite
  let _bcv=null,_bctx=null;
  function spriteBuffer(){ if(!_bcv||_bcv.width!==cv.width||_bcv.height!==cv.height){ _bcv=document.createElement('canvas'); _bcv.width=cv.width; _bcv.height=cv.height; _bctx=_bcv.getContext('2d'); } return _bctx; }
  ctx.imageSmoothingEnabled = false;
  const W = 480, H = 270;
  function resize(){ const s=Math.max(1,Math.min(Math.floor(innerWidth/W),Math.floor(innerHeight/H))||1); cv.style.width=(W*s)+'px'; cv.style.height=(H*s)+'px'; }
  addEventListener('resize', resize); resize();

  const FLOOR_TOP=168, FLOOR_BOT=250, WORLD_LEN=2450;
  const LEN=()=>(game&&game.levelLen)||WORLD_LEN;
  const depthScale = y => 0.82 + (y-FLOOR_TOP)/(FLOOR_BOT-FLOOR_TOP)*0.30;
  const F=1/60;
  const _sc={};
  function shade(hex,d){ const key=hex+d; if(_sc[key]) return _sc[key]; const n=parseInt(hex.slice(1),16);
    let r=(n>>16)+d,g=((n>>8)&255)+d,b=(n&255)+d; r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return _sc[key]='#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }

  const keys={}, pressed={};
  const MOVE={ ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right',ArrowUp:'up',KeyW:'up',ArrowDown:'down',KeyS:'down' };
  const SYS={ Escape:'pause',KeyP:'pause',Enter:'confirm',KeyR:'reset',Digit1:'opt1',Digit2:'opt2',Digit3:'opt3',Digit4:'opt4',Digit5:'opt5' };
  let BIND={ light:'KeyJ', heavy:'KeyK', grab:'KeyI', block:'KeyL' };
  let DISCOVERED={}, PROGRESS={world:0,level:0,rank:-1};   // persisted save: bestiary unlocks + furthest reached
  let CHAR={ level:1, xp:0, unspent:0, stats:{vit:0,str:0,reach:0,guard:0,focus:0} };   // persistent RPG character
  const STAT_DEFS=[
    {k:'vit',  name:'VITALITY', d:'+12 max health'},
    {k:'str',  name:'STRENGTH', d:'+8% attack damage'},
    {k:'reach',name:'REACH',    d:'+3 weapon reach'},
    {k:'guard',name:'GUARD',    d:'-6% damage taken'},
    {k:'focus',name:'FOCUS',    d:'+15% Valor gain'},
  ];
  function xpForLevel(lv){ return 30 + (lv-1)*22; }                 // rising threshold
  function xpFor(e){ let x=Math.round((e.maxhp||40)/4); if(e.elite)x*=2; if(e.boss)x*=5; return Math.max(3,x); }
  function enemyScale(){ return 1 + Math.max(0,CHAR.level-1)*0.035; }   // enemies keep pace with the knight
  function applyCharStats(p){ if(!p) return; const s=CHAR.stats;
    p.maxhp=100+s.vit*12; p.hp=Math.min(p.maxhp,p.hp||p.maxhp);
    p.strMult=1+s.str*0.08; p.reachBonus=s.reach*3; p.dmgMult=Math.pow(0.94,s.guard); p.valorMult=1+s.focus*0.15; }
  function gainXP(a){ if(!game||game.mode==='tutorial') return; CHAR.xp+=a; let leveled=false;
    while(CHAR.xp>=xpForLevel(CHAR.level)){ CHAR.xp-=xpForLevel(CHAR.level); CHAR.level++; CHAR.unspent++; leveled=true; }
    if(leveled){ SFX.win(); banner('LEVEL UP!','#e6c030'); game.luSel=0; if(game.state==='play') game.state='levelup'; }
    saveCfg(); }
  let rebinding=null;
  function mapCode(code){ if(MOVE[code]) return MOVE[code]; if(code==='Space') return 'block'; if(code==='ShiftLeft'||code==='ShiftRight') return 'dodge'; if(code==='KeyU') return 'sthrow'; if(code==='KeyO') return 'art'; for(const a in BIND) if(BIND[a]===code) return a; if(SYS[code]) return SYS[code]; return null; }
  addEventListener('keydown', e=>{
    audioInit();
    if(rebinding){ if(e.code!=='Escape'&&!MOVE[e.code]&&e.code!=='Space'){ BIND[rebinding]=e.code; saveCfg(); } rebinding=null; e.preventDefault(); return; }
    const a=mapCode(e.code); if(!a) return; e.preventDefault(); if(!keys[a]) pressed[a]=true; keys[a]=true;
  });
  addEventListener('keyup', e=>{ const a=mapCode(e.code); if(a) keys[a]=false; });

  const ATT={
    light1:{startup:4,active:4,recover:7,dmg:5,kb:2.2,reach:34,next:'light2'},
    light2:{startup:4,active:4,recover:8,dmg:5,kb:2.4,reach:34,next:'light3'},
    light3:{startup:5,active:5,recover:14,dmg:9,kb:5.0,reach:36,next:null},
    heavy:{startup:11,active:5,recover:20,dmg:16,kb:7.5,reach:40,next:null},
    grab:{startup:6,active:4,recover:18,dmg:14,kb:9.0,reach:26,next:null,throw:true},
    gswing:{startup:5,active:5,recover:18,dmg:8,kb:5.0,reach:38,next:null},
    gcleave:{startup:16,active:6,recover:26,dmg:22,kb:11,reach:46,next:null},
    gpoke:{startup:8,active:4,recover:14,dmg:9,kb:4.0,reach:60,next:null},
    dashatk:{startup:3,active:5,recover:16,dmg:12,kb:8.5,reach:38,next:null},
    launch:{startup:8,active:5,recover:22,dmg:11,kb:3.0,reach:34,next:null,launch:true},
    gsmash:{startup:20,active:6,recover:26,dmg:24,kb:12,reach:46,next:null,unblock:true},
    gdagger:{startup:3,active:3,recover:8,dmg:6,kb:3.0,reach:30,next:null},
  };
  const PARRY_FRAMES=8;

  const ARCH={
    grunt:{hp:70,spd:1.15,size:1.0,swing:'gswing',tele:24,canBlock:0.40,armor:false,tough:false,keep:0,weapon:'sword',
      build:{helm:'pot',shield:'buckler',pauld:'strap',bulk:0.92},
      pal:{armor:'#8a5233',trim:'#c48a4e',dark:'#3c2417',skin:'#c99a6a',plume:'#7a7a7a',weap:'#d8d2c4'}},
    berserker:{hp:110,spd:1.0,size:1.18,swing:'gcleave',tele:40,canBlock:0,armor:true,tough:false,keep:0,weapon:'cleave',
      build:{helm:'horns',bare:true,pauld:'spike',shield:null,bulk:1.30},
      pal:{armor:'#6e2b2b',trim:'#b0413a',dark:'#2a0f0f',skin:'#c08a5a',plume:'#e0b020',weap:'#c9c2b4'}},
    spearman:{hp:60,spd:1.35,size:1.0,swing:'gpoke',tele:18,canBlock:0,armor:false,tough:false,keep:56,weapon:'spear',
      build:{helm:'cone',shield:'round',pauld:'strap',bulk:0.84},
      pal:{armor:'#3f6b4a',trim:'#6ea87b',dark:'#1c3325',skin:'#c99a6a',plume:'#c9b04f',weap:'#cfd6d2'}},
    shieldbreaker:{hp:130,spd:0.9,size:1.14,swing:'gswing',tele:28,canBlock:0.6,armor:true,tough:true,keep:0,weapon:'sword',
      build:{helm:'great',shield:'tower',pauld:'heavy',bulk:1.22},
      pal:{armor:'#5a5f6b',trim:'#98a0ac',dark:'#25282f',skin:'#c99a6a',plume:'#8a3a3a',weap:'#e6ecf5'}},
    captain:{hp:200,spd:1.35,size:1.22,swing:'gcleave',tele:22,canBlock:0.5,armor:true,tough:false,keep:0,weapon:'cleave',boss:true,
      build:{helm:'wing',cape:'#6a2f7a',shield:'ornate',pauld:'ornate',bulk:1.14,gold:true},
      pal:{armor:'#5a3f7a',trim:'#caa6f0',dark:'#241634',skin:'#d0a070',plume:'#e6c030',weap:'#efe6ff'}},
    archer:{hp:48,spd:1.2,size:0.95,swing:'gswing',tele:22,canBlock:0,armor:false,tough:false,keep:118,weapon:'bow',ranged:'arrow',
      build:{helm:'hood',shield:null,pauld:'strap',bulk:0.82,cape:'#3a5a2a'},
      pal:{armor:'#4a5a34',trim:'#7a9050',dark:'#25301a',skin:'#c99a6a',plume:'#6a8040',weap:'#8a6a3a'}},
    rogue:{hp:52,spd:1.7,size:0.9,swing:'gdagger',tele:12,canBlock:0,armor:false,tough:false,keep:0,weapon:'daggers',evade:true,
      build:{helm:'hood',shield:null,pauld:'strap',bulk:0.8,cape:'#2a2030'},
      pal:{armor:'#3a3348',trim:'#6a5a80',dark:'#1c1826',skin:'#c99a6a',plume:'#8a4a6a',weap:'#d8d2c4'}},
    maul:{hp:150,spd:0.85,size:1.24,swing:'gsmash',tele:32,canBlock:0.2,armor:true,tough:true,keep:0,weapon:'maul',
      build:{helm:'great',shield:null,pauld:'heavy',bulk:1.34},
      pal:{armor:'#5a4a3a',trim:'#8a7050',dark:'#2a2018',skin:'#c08a5a',plume:'#8a3a2a',weap:'#a89880'}},
    lancer:{hp:90,spd:1.25,size:1.05,swing:'gpoke',tele:26,canBlock:0.3,armor:false,tough:false,keep:0,weapon:'spear',charge:true,
      build:{helm:'wing',shield:'kite',pauld:'plate',bulk:1.02,cape:'#4a2a2a'},
      pal:{armor:'#7a4a4a',trim:'#c08a8a',dark:'#331818',skin:'#c99a6a',plume:'#e0d0d0',weap:'#e6ecf5'}},
    warlock:{hp:60,spd:1.0,size:1.0,swing:'gswing',tele:30,canBlock:0,armor:false,tough:false,keep:100,weapon:'staff',ranged:'magic',
      build:{helm:'wizard',shield:null,pauld:'strap',bulk:0.9,cape:'#2a1a3a'},
      pal:{armor:'#3a2a5a',trim:'#8a6ac0',dark:'#1a1028',skin:'#c99a6a',plume:'#b070ef',weap:'#6a4a2a'}},
  };

  // ---- Stage script: gates trigger screen-lock encounters ----
  // ---- WORLD → LEVELS (level-slot architecture; add worlds by extending WORLDS) ----
  const ICE={armor:'#5a7fa0',trim:'#c4e4f2',dark:'#28384a',skin:'#c99a6a',plume:'#8fc0e0',weap:'#eaf4fc'};
  const ICE2={armor:'#6a6a8c',trim:'#c8c8e8',dark:'#2a2a3c',skin:'#c08a5a',plume:'#a8d4ff',weap:'#eaeefc'};
  const BOSSICE={armor:'#7fa8d4',trim:'#e4f2ff',dark:'#2a3a54',skin:'#d0b090',plume:'#c4e8ff',weap:'#f2f8ff'};
  const FOREST = {
    name:'THE FOREST',
    levels:[
      { name:'WOODLAND PATH', song:'forest1', theme:'woodland',
        encounters:[ [['grunt','grunt']], [['grunt','spearman']] ],
        mini:{type:'shieldbreaker', name:'OAKFIST', sub:'Bulwark of the Path', hp:240, traits:{armor:true}} },
      { name:'MISTY GROVE', song:'forest2', theme:'mist',
        encounters:[ [['grunt','archer']], [['spearman','archer','grunt']] ],
        mini:{type:'archer', name:'DEADEYE', sub:'The Long Shot', hp:150, traits:{}} },
      { name:'THORNWOOD', song:'forest3', theme:'thorn',
        encounters:[ [['rogue','grunt']], [['berserker','rogue','spearman']] ],
        mini:{type:'berserker', name:'BRAMBLEHIDE', sub:'The Maddened', hp:270, traits:{savage:true}} },
      { name:'ANCIENT ROOTS', song:'forest4', theme:'roots',
        encounters:[ [['maul','grunt']], [['shieldbreaker','maul','archer']] ],
        mini:{type:'maul', name:'IRONBARK', sub:'Root-Warden', hp:340, traits:{}} },
    ],
    boss:{type:'captain', name:'THE FOREST WARDEN', sub:'Guardian of the Wood', hp:440,
      pal:{armor:'#3f6b3a',trim:'#9ad09a',dark:'#182e18',skin:'#c8a874',plume:'#e6c030',weap:'#e2eede'}},
    bossLevel:{name:"THE WARDEN'S GLADE", theme:'glade', song:'boss'},
  };
  const FROST = {
    name:'FROSTVALE',
    levels:[
      { name:'SNOWFIELD PATH', song:'frost1', theme:'snow',
        encounters:[ [['grunt','archer']], [['spearman','grunt']] ],
        mini:{type:'shieldbreaker', name:'FROSTBITE', sub:'Warden of the Drift', hp:290, traits:{armor:true}, pal:ICE} },
      { name:'GLACIER GROVE', song:'forest3', theme:'glacier',
        encounters:[ [['lancer','grunt']], [['archer','lancer','spearman']] ],
        mini:{type:'lancer', name:'GALEFORCE', sub:'The Charging Gale', hp:240, traits:{}, pal:ICE} },
      { name:'BLIZZARD RIDGE', song:'forest3', theme:'blizzard',
        encounters:[ [['warlock','grunt']], [['berserker','warlock','archer']] ],
        mini:{type:'warlock', name:'HEXFROST', sub:'Frost Conjurer', hp:200, traits:{}, pal:ICE2} },
      { name:'CRYSTAL CAVERNS', song:'boss', theme:'crystal',
        encounters:[ [['maul','warlock']], [['lancer','rogue','archer']] ],
        mini:{type:'shieldbreaker', name:'GLACIUS', sub:'Crystalborn', hp:380, traits:{giant:true}, pal:ICE} },
    ],
    boss:{type:'captain', name:'THE HOARFROST KING', sub:'Sovereign of the Frozen Waste', hp:520, pal:BOSSICE},
    bossLevel:{name:'THE FROZEN THRONE', theme:'frostglade', song:'boss'},
  };
  const WORLDS=[FOREST, FROST];
  function curWorld(){ return WORLDS[game.worldIdx||0]; }
  function buildLevel(li){ const L=curWorld().levels[li]; const gates=[]; let x=500;
    L.encounters.forEach(waves=>{ gates.push({x, waves, done:false, started:false}); x+=500; });
    gates.push({x, mini:L.mini, done:false, started:false});
    return { name:L.name, song:L.song, theme:L.theme, len:x+170, gates, boss:false, idx:li }; }
  function buildBossLevel(){ const w=curWorld(), bl=w.bossLevel; return { name:bl.name, song:bl.song, theme:bl.theme, len:840, boss:true,
    gates:[{x:540, worldboss:w.boss, adds:[['grunt','grunt']], done:false, started:false}] }; }
  function loadLevel(li){
    const w=curWorld(); const lv = li>=w.levels.length ? buildBossLevel() : buildLevel(li);
    game.levelIdx=li; game.level=lv; game.gateIdx=0; game.waveIdx=0; game.levelLen=lv.len; game.levelName=lv.name; game.theme=lv.theme; game.song=lv.song;
    if(game.mode!=='tutorial'){ const rank=(game.worldIdx||0)*100+li; if(rank>PROGRESS.rank){ PROGRESS.rank=rank; PROGRESS.world=game.worldIdx||0; PROGRESS.level=li; saveCfg(); } }   // furthest-reached save
    game.lock=false; game.progressWall=0; game.camX=0;
    player.x=60; player.vx=0; player.vy=0; player.state='idle';
    enemies.length=0; shots.length=0; pickups.length=0; props.length=0; ebolts.length=0;
    for(let bx=280,k=0; bx<lv.len-200; bx+=Math.round(300+((k*97)%150)),k++){ props.push({x:bx,y:FLOOR_TOP+18+((k%3)*24),broken:0,t:0}); }
    banner(w.name+'  ·  '+lv.name, '#a9e5a9'); msgT=120;
  }
  function spawnBoss(def){ const e=spawnEnemy(def.type, game.camX+W-60, 238); if(!e) return e;
    e.boss=true; e.name=def.name; discover(def.name);   // bestiary unlock (boss entry keyed by name)
    if(def.traits){ if(def.traits.giant) makeElite(e,'giant'); if(def.traits.savage) makeElite(e,'savage'); if(def.traits.armor) e.armor=true; }
    if(def.pal) e.pal=def.pal;
    e.hp=e.maxhp=def.hp; e.elite=null; e.eliteTag=null;
    game.nameCard={t:0,name:def.name,sub:def.sub}; game.punch=1; return e; }

  const UPGRADES=[
    {k:'Vigor',      d:'+25 max health, full heal', ap:p=>{p.maxhp+=25; p.hp=p.maxhp;}},
    {k:'Riposte',    d:'Parry restores 10 health',  ap:p=>{p.parryHeal=(p.parryHeal||0)+10;}},
    {k:'Longsword',  d:'+7 attack reach',           ap:p=>{p.reachBonus=(p.reachBonus||0)+7;}},
    {k:'Swiftness',  d:'+20% move speed',           ap:p=>{p.spd*=1.2;}},
    {k:'Leech',      d:'Throws heal 12 health',      ap:p=>{p.grabHeal=(p.grabHeal||0)+12;}},
    {k:'Ironheart',  d:'Take 20% less damage',       ap:p=>{p.dmgMult=(p.dmgMult||1)*0.8;}},
    {k:'Executioner',d:'+40% heavy damage',          ap:p=>{p.heavyMult=(p.heavyMult||1)*1.4;}},
  ];
  const RELICS=[
    {k:'Thornmail',   d:'Attackers take 4 damage',      relic:1, ap:p=>{p.thorns=(p.thorns||0)+4;}},
    {k:'Storm Parry', d:'Parries deal 16 damage',       relic:1, ap:p=>{p.stormparry=(p.stormparry||0)+16;}},
    {k:'War Battery', d:'Valor builds 60% faster',      relic:1, ap:p=>{p.valorMult=(p.valorMult||1)*1.6;}},
    {k:'Reaper',      d:'Execute foes under 15% HP',     relic:1, ap:p=>{p.reaper=1;}},
    {k:'Bloodthirst', d:'+35 max HP, full heal',         relic:1, ap:p=>{p.maxhp+=35;p.hp=p.maxhp;}},
  ];
  const ELITES={
    warded:{tag:'WARDED', aura:'#6ec6ef', mod:e=>{ e.canBlock=0.85; e.hp=Math.round(e.hp*1.4); e.maxhp=e.hp; }},
    savage:{tag:'SAVAGE', aura:'#ef6e4a', mod:e=>{ e.enrageAble=true; e.hp=Math.round(e.hp*1.2); e.maxhp=e.hp; }},
    giant: {tag:'GIANT',  aura:'#efd06e', mod:e=>{ e.armor=true; e.size*=1.28; e.hp=Math.round(e.hp*1.9); e.maxhp=e.hp; }},
  };
  function makeElite(e,type){ const el=ELITES[type]; if(!el||!e) return e; e.elite=type; e.eliteAura=el.aura; e.eliteTag=el.tag; el.mod(e); return e; }

  function makeFighter(o){
    return { x:o.x,y:o.y,face:o.face,isPlayer:!!o.isPlayer,type:o.type||'player',boss:!!o.boss,
      hp:o.hp,maxhp:o.hp,name:o.name,pal:o.pal,size:o.size||1,
      spd:o.spd||1.7,swing:o.swing,tele:o.tele||24,canBlock:o.canBlock||0,armor:!!o.armor,tough:!!o.tough,keep:o.keep||0,weapon:o.weapon||'sword',build:o.build||null,ranged:o.ranged||null,charge:!!o.charge,evade:!!o.evade,chargeT:0,chargeHit:false,
      vx:0,vy:0,state:'idle',att:null,attT:0,attHit:false,combo:null,comboBuf:0,
      hitStun:0,stunT:0,downT:0,invul:0,flash:0,deadT:0,parryWindow:0,blockT:0,think:0,telegraph:0,
      reachBonus:0,parryHeal:0,grabHeal:0,dmgMult:1,heavyMult:1,strMult:1,
      z:0,zv:0,dashT:0,tapDir:0,tapT:0,valor:0,artT:0,
      rollT:0,hasShield:true,shieldCd:0,squash:0,
      thorns:0,stormparry:0,valorMult:1,reaper:0, elite:null,eliteAura:null,eliteTag:null,enrageAble:false,enraged:false };
  }

  let player, enemies, hitstop, shake, msg, msgT, msgCol, game;
  const shots=[], props=[], pickups=[], ebolts=[];

  function spawnEnemy(type,x,y){
    const a=ARCH[type]; if(!a) return;
    const e=makeFighter({type,name:type.toUpperCase(),face:-1,boss:a.boss,
      x:x!=null?x:game.camX+W+20, y:y!=null?y:FLOOR_TOP+20+Math.random()*(FLOOR_BOT-FLOOR_TOP-30),
      hp:a.hp,pal:a.pal,size:a.size,spd:a.spd,swing:a.swing,tele:a.tele,canBlock:a.canBlock,armor:a.armor,tough:a.tough,keep:a.keep,weapon:a.weapon,build:a.build,ranged:a.ranged,charge:a.charge,evade:a.evade});
    const wsc=(1+(game.worldIdx||0)*0.3)*enemyScale(); if(wsc!==1){ e.hp=e.maxhp=Math.round(e.maxhp*wsc); }   // later worlds + level-scaling
    if(game.mode!=='tutorial') discover(type);   // bestiary unlock
    enemies.push(e); return e;
  }

  function reset(mode){

        f.state='sidestep'; f.stepT=0; f.stepVy=dv*3.6; f.vx=(keys.left?-1:keys.right?1:0)*1.4; f.z=0.1; f.invul=12; SFX.whoosh(); return; }
      if(pressed.art && f.valor>=50){ f.valor-=50; f.state='art'; f.artT=0; f.invul=46; f.vx=0; SFX.win(); banner("KNIGHT'S ART!",'#e6c030'); return; }
      if(pressed.sthrow && f.hasShield && f.shieldCd<=0){ throwShield(f); return; }
      if(pressed.grab){ startAttack(f,'grab'); return; }
      if(keys.block && f.hasShield){ if(pressed.block) f.parryWindow=PARRY_FRAMES; f.state='block'; f.vx=0; f.vy=0; clampPos(f); return; }
      if(pressed.light){ startAttack(f,'light1'); return; }
      if(pressed.heavy){ startAttack(f, keys.up?'launch':'heavy'); return; }
      let mx=(keys.right?1:0)-(keys.left?1:0), my=(keys.down?1:0)-(keys.up?1:0);
      f.vx=mx*f.spd; f.vy=my*f.spd*0.72; if(mx) f.face=mx; f.x+=f.vx; f.y+=f.vy; f.state=(mx||my)?'walk':'idle'; clampPos(f);
    } else updateAI(f);
  }

  function updateAI(f){
    const p=player; if(p.state==='dead'){ f.state='idle'; f.vx=0; return; }
    if(f.enrageAble&&!f.enraged&&f.hp<f.maxhp*0.4){ f.enraged=true; f.spd*=1.45; f.tele=Math.max(10,f.tele-6); f.eliteAura='#ff2010'; banner('SAVAGE ENRAGED!','#ff6a4a'); }
    const dx=p.x-f.x, dy=p.y-f.y, adx=Math.abs(dx), ady=Math.abs(dy); f.face=dx>=0?1:-1;
    if(f.blockT>0){ f.blockT--; f.state='block'; f.vx*=0.5; f.x+=f.vx; clampPos(f); return; }
    if(f.telegraph>0){ f.telegraph--; f.vx*=0.6; f.x+=f.vx; f.state='windup';
      if(f.telegraph===0){ if(f.ranged){ fireBolt(f,f.ranged); f.state='idle'; f.think=f.ranged==='magic'?100:64; } else if(f.charge){ f.state='charge'; f.chargeT=0; f.chargeHit=false; f.vx=f.face*5.2; } else startAttack(f,f.swing); }
      clampPos(f); return; }
    f.think--;
    if(f.evade&&p.state==='attack'&&adx<44&&ady<depthTol+6&&f.think<=0&&Math.random()<0.55){ f.state='roll'; f.rollT=0; f.vx=-f.face*4.4; f.invul=14; f.think=34; clampPos(f); return; }
    if(f.canBlock&&p.state==='attack'&&adx<48&&ady<depthTol+6&&f.think<=0&&Math.random()<f.canBlock){ f.blockT=20; f.think=48; f.vx=0; clampPos(f); return; }
    if(f.keep>0){
      if(adx<f.keep-10&&f.think<=0){ const away=-Math.sign(dx)||1; f.vx=away*f.spd; f.x+=f.vx; f.vy=(ady>10?Math.sign(dy):0)*f.spd*0.7; f.y+=f.vy; f.state='walk'; clampPos(f); return; }
      if(adx<f.keep+8&&ady<depthTol&&f.think<=0){ f.telegraph=f.tele; f.think=70; f.vx=0; clampPos(f); return; }
    } else if(adx<(f.charge?104:40)&&ady<depthTol&&f.think<=0){ f.telegraph=f.tele; f.think=60; f.vx=0; clampPos(f); return; }
    const reach=f.keep>0?f.keep:28;
    const mvx=adx>reach?Math.sign(dx):0, mvy=ady>10?Math.sign(dy):0;
    f.vx=mvx*f.spd; f.vy=mvy*f.spd*0.7; f.x+=f.vx; f.y+=f.vy; f.state=(mvx||mvy)?'walk':'idle'; if(f.think<0) f.think=0; clampPos(f);
  }

  function livingFoes(){ return enemies.filter(e=>e.state!=='dead').length; }

  function updateTutorial(){
    const step=TUT[game.tutStep];
    if(!step){ if(!game.tutDone){ game.tutDone=1; game.tutT=0; banner('TRAINING COMPLETE','#a9e5a9'); msgT=999; } game.tutT=(game.tutT||0)+1; if(game.tutT>120){ scene='title'; } return; }
    if(step.c()){ game.tutStep++; game.tutFlash=22; SFX.select(); const nx=TUT[game.tutStep]; if(nx&&/Valor/.test(nx.m)) player.valor=100; }
  }
  function updateStage(){
    const g=game;
    if(g.mode==='tutorial'){ updateTutorial(); return; }
    if(g.mode==='endless'){
      if(g.lock && livingFoes()===0 && enemies.every(e=>e.state!=='dead'||e.deadT>18)){
        startEndlessWave();   // growth now comes from XP level-ups, not the roguelike draft
      }
      return;
    }
    // ---- campaign: Forest World, level by level ----
    const lv=g.level; if(!lv) return;
    if(!g.lock && g.gateIdx<lv.gates.length){
      const gate=lv.gates[g.gateIdx];
      if(!gate.started && player.x>=gate.x){
        gate.started=true; g.lock=true; g.waveIdx=0; g.progressWall=g.camX;
        if(gate.worldboss){ spawnBoss(gate.worldboss); if(gate.adds) spawnWave(gate.adds[0]); }
        else if(gate.mini){ spawnBoss(gate.mini); banner('MINI-BOSS','#e6c030'); }
        else { spawnWave(gate.waves[0]); banner('AMBUSH!','#e5a9a9'); }
      }
    }
    if(g.lock){
      const gate=lv.gates[g.gateIdx];
      if(livingFoes()===0 && enemies.every(e=>e.deadT>20 || e.state!=='dead')){
        if(gate.waves){ g.waveIdx++; if(g.waveIdx<gate.waves.length){ spawnWave(gate.waves[g.waveIdx]); return; } }
        g.lock=false; gate.done=true; g.progressWall=gate.x-40;
        if(gate.worldboss){ SFX.win(); if(game.worldIdx+1<WORLDS.length){ worldComplete(game.worldIdx+1); } else { g.state='clear'; banner('ALL WORLDS CLEARED — press R','#a9e5a9'); msgT=999; } return; }
        if(gate.mini){ SFX.win(); levelComplete(g.levelIdx+1); g.gateIdx++; return; }
        g.gateIdx++;   // (roguelike upgrade draft retired in favour of XP level-ups)
      }
    }
  }
  function levelComplete(nextIdx){ game.state='levelclear'; game.nextLevel=nextIdx; game.levelClearT=0; banner('LEVEL COMPLETE','#a9e5a9'); msgT=999; }
  function worldComplete(nw){ game.state='worldclear'; game.nextWorld=nw; game.levelClearT=0; banner(curWorld().name+' CLEARED','#a9e5a9'); msgT=999; }

    if(e&&game.mode==='campaign'&&game.levelIdx>=1&&Math.random()<0.30){ const ks=Object.keys(ELITES); makeElite(e, ks[Math.floor(Math.random()*ks.length)]); } }); }

  function offerUpgrade(){
    const up=UPGRADES.slice(), rl=RELICS.slice(), pick=[];
    for(let i=0;i<2&&up.length;i++) pick.push(up.splice(Math.floor(Math.random()*up.length),1)[0]);

    if(game.lock) return; // frozen during fights
    const target=player.x - W*0.42;
    game.camX = Math.max(0, Math.min(LEN()-W, target));

  function step(dt){
    if(game.state==='upgrade'){
      const i = pressed.opt1?0 : pressed.opt2?1 : pressed.opt3?2 : -1;
      if(i>=0 && game.choices[i]){ game.choices[i].ap(player); banner(game.choices[i].k+' gained','#a9e5a9'); game.state='play'; if(game.mode==='endless') startEndlessWave(); }
      if(pressed.reset) reset(game.mode);
      clearPressed(); return;
    }
    if(game.state==='levelup'){
      const n=STAT_DEFS.length; if(pressed.up) game.luSel=(game.luSel+n-1)%n; if(pressed.down) game.luSel=(game.luSel+1)%n; if(pressed.up||pressed.down) SFX.select();
      const i = pressed.opt1?0:pressed.opt2?1:pressed.opt3?2:pressed.opt4?3:pressed.opt5?4:(pressed.confirm||pressed.light)?game.luSel:-1;
      if(i>=0){ const k=STAT_DEFS[i].k; CHAR.stats[k]++; if(k==='vit'){ player.maxhp+=12; player.hp+=12; } applyCharStats(player); player.hp=Math.min(player.maxhp,player.hp); CHAR.unspent--; SFX.select(); banner(STAT_DEFS[i].name+' +1','#a9e5a9'); saveCfg(); if(CHAR.unspent<=0) game.state='play'; else game.luSel=0; }
      clearPressed(); return;
    }
    if(game.state==='levelclear'){ game.levelClearT++; if(game.levelClearT>150 || pressed.confirm || pressed.light){ game.state='play'; loadLevel(game.nextLevel); } clearPressed(); return; }
    if(game.state==='worldclear'){ game.levelClearT++; if(game.levelClearT>200 || pressed.confirm || pressed.light){ game.worldIdx=game.nextWorld; game.state='play'; loadLevel(0); } clearPressed(); return; }
    if(game.state==='gameover'||game.state==='clear'){ if(pressed.reset) reset(game.mode); clearPressed(); if(msgT<900) msgT=999; return; }

    if(hitstop>0){ hitstop--; for(const pt of parts){ pt.x+=pt.vx*0.2; pt.y+=pt.vy*0.2; } clearPressed(); return; }

    updateFighter(player,dt);
    for(const e of enemies) updateFighter(e,dt);
    for(const e of enemies){ if(e.state==='dead'&&!e.xpGiven){ e.xpGiven=true; gainXP(xpFor(e)); } }   // XP on any death
    for(let i=enemies.length-1;i>=0;i--){ if(enemies[i].state==='dead'&&enemies[i].deadT>70) enemies.splice(i,1); }
    updateShots(); updateBolts();
    for(let i=pickups.length-1;i>=0;i--){ const pk=pickups[i]; pk.t++; if(pk.vy!==0){ pk.y+=pk.vy; pk.vy+=0.22; if(pk.vy>0&&pk.t>12) pk.vy=0; }
      if(player.state!=='dead'&&Math.abs(pk.x-player.x)<16&&Math.abs(pk.y-player.y)<depthTol){ player.hp=Math.min(player.maxhp,player.hp+18); spark(pk.x,pk.y-6,'#6ee06e',12); SFX.block(); banner('+18 HP','#a9e5a9'); pickups.splice(i,1); } }
    for(let i=parts.length-1;i>=0;i--){ const pt=parts[i]; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=(pt.g!==undefined?pt.g:0.25); pt.vx*=0.98; pt.life--; if(pt.life<=0) parts.splice(i,1); }
    for(let i=rings.length-1;i>=0;i--){ const rg=rings[i]; rg.r+=rg.vr; rg.vr*=0.9; rg.life--; if(rg.life<=0) rings.splice(i,1); }
    for(let i=floats.length-1;i>=0;i--){ const fl=floats[i]; fl.y+=fl.vy; fl.vy+=0.06; fl.life--; if(fl.life<=0) floats.splice(i,1); }

    // player death → lives / gameover
    if(player.state==='dead'&&player.deadT>50){
      game.lives--;
      if(game.lives>0){ player.state='idle'; player.hp=player.maxhp; player.x=Math.max(game.camX+40,game.progressWall+20); player.deadT=0; player.invul=70; player.vx=0; banner('LIFE LOST — '+game.lives+' left','#e5a9a9'); }
      else { game.state='gameover'; if(game.mode==='endless'){ if(game.wave>ENDLESS_BEST){ ENDLESS_BEST=game.wave; saveCfg(); } banner('ENDLESS — REACHED WAVE '+game.wave+' — press R','#e5a9a9'); } else banner('YOU FELL — press R','#e5a9a9'); msgT=999; }
    }

    updateStage();
    updateCamera();
    if(shake>0) shake*=0.85; if(msgT>0) msgT--; if(game.goPulse>0) game.goPulse--; if(game.bigFlash>0) game.bigFlash--; if(game.comboT>0){ game.comboT--; if(game.comboT===0) game.combo=0; }
    if(game.punch>0) game.punch*=0.88; if(game.nameCard){ game.nameCard.t++; if(game.nameCard.t>150) game.nameCard=null; } if(game.tutFlash>0) game.tutFlash--;
    if(pressed.reset) reset();
    clearPressed();
  }

  // painterly form-shading: 0=flat (original), 1=subtle, 2=bold. Applied as a
  // source-atop overlay so one pass rounds the whole silhouette (armor/helm/weapon/cape)
  // with a single warm key light + cool shadow, top-light and contact AO.
  let PAINT=1;
  function formShade(tw){
    if(PAINT<=0) return;
    const sub=PAINT===1;
    // Gradients are anchored to the body but the fill covers a generous area; the end
    // colour-stops clamp beyond their endpoints, so swung weapons get a flat shadow tint
    // instead of a seam where the fill would otherwise stop.
    const fx=-tw-30, fw=tw*2+92, fy=-70, fh=80;
    ctx.save();
    ctx.globalCompositeOperation='source-atop';
    // horizontal: warm key on the front (-x) → cool shadow on the back (+x)
    const kh=sub?0.24:0.32, sh=sub?0.32:0.42;
    const gh=ctx.createLinearGradient(-tw-8,0,tw+8,0);
    gh.addColorStop(0.00,'rgba(255,238,200,'+kh+')');
    gh.addColorStop(0.40,'rgba(255,238,200,0)');
    gh.addColorStop(0.56,'rgba(12,16,30,0)');
    gh.addColorStop(1.00,'rgba(12,16,30,'+sh+')');
    ctx.fillStyle=gh; ctx.fillRect(fx,fy,fw,fh);

  function wrap(text,x,y,maxw,lh){ const words=text.split(' '); let line='',yy=y; ctx.textAlign='center'; const cx=x+maxw/2;

  // ---- audio (procedural WebAudio) ----
  let actx=null,sfxGain=null,musicGain=null,musicTimer=null,musicStep=0;

  function audioInit(){ if(actx) return; try{ actx=new (window.AudioContext||window.webkitAudioContext)();
    sfxGain=actx.createGain(); sfxGain.gain.value=cfg.sfx; sfxGain.connect(actx.destination);

  }catch(e){} }
  function blip(freq,dur,type,gain,slideTo){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square'; o.frequency.value=freq; if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,actx.currentTime+dur);

  function noise(dur,gain){ if(!actx) return; const n=Math.floor(actx.sampleRate*dur),buf=actx.createBuffer(1,n,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n); const s=actx.createBufferSource(); s.buffer=buf; const g=actx.createGain(); g.gain.value=gain||0.3; s.connect(g); g.connect(sfxGain); s.start(); }
  // richer voice: oscillator with a real attack + exp decay envelope, optional pitch slide + detune
  function osc(freq,dur,type,gain,slideTo,atk,detune){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(Math.max(1,freq),actx.currentTime);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),actx.currentTime+dur);
    if(detune) o.detune.value=detune;
    g.gain.setValueAtTime(0.0001,actx.currentTime); g.gain.linearRampToValueAtTime(gain||0.2,actx.currentTime+(atk||0.005));
    g.gain.exponentialRampToValueAtTime(0.0008,actx.currentTime+dur); o.connect(g); g.connect(sfxGain); o.start(); o.stop(actx.currentTime+dur+0.03); }
  // filtered noise burst — low-pass = dull/thud, high-pass = bright/metallic
  function fnoise(dur,gain,cutoff,hp){ if(!actx) return; const n=Math.floor(actx.sampleRate*dur),buf=actx.createBuffer(1,n,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n); const s=actx.createBufferSource(); s.buffer=buf;
    const f=actx.createBiquadFilter(); f.type=hp?'highpass':'lowpass'; f.frequency.value=cutoff||2000; f.Q.value=hp?0.9:0.4;
    const g=actx.createGain(); g.gain.value=gain||0.3; s.connect(f); f.connect(g); g.connect(sfxGain); s.start(); }
  const rnd=(a,b)=>a+Math.random()*(b-a);
  // per-weapon voices: swing colour [freq,slideTo,type,gain], impact pitch, body weight
  const WEAPSND={
    sword:  {sw:[540,190,'sawtooth',0.09], hf:150, body:0.95},
    cleave: {sw:[380,150,'sawtooth',0.12], hf:120, body:1.15},
    maul:   {sw:[210,95, 'sawtooth',0.15], hf:70,  body:1.55},
    spear:  {sw:[760,300,'sawtooth',0.07], hf:210, body:0.7 },
    daggers:{sw:[940,440,'sawtooth',0.06], hf:270, body:0.5 },
    staff:  {sw:[620,320,'sine',    0.08], hf:190, body:0.8, magic:true},

  };
  const SFX={
    swing:(w)=>{ const s=WEAPSND[w]||WEAPSND.sword, dv=rnd(0.9,1.12), a=s.sw;

    hit:(big,w)=>{ const s=WEAPSND[w]||WEAPSND.sword, dv=rnd(0.85,1.15);

      osc((big?76:s.hf)*dv, big?0.20:0.13, 'square', (big?0.32:0.2)*s.body, (big?40:s.hf*0.5)*dv, 0.002); // body
      if(big) osc(46*dv,0.24,'sine',0.42,30,0.002);                              // sub-thump weight
      if(s.magic) osc(520*dv,0.18,'triangle',0.12,220,0.006); },
    block:()=>{ const dv=rnd(0.9,1.14);                                          // metallic clank
      osc(700*dv,0.10,'square',0.15,470,0.002); osc(1040*dv,0.09,'square',0.08,760,0.002,14);

    parry:()=>{ const dv=rnd(0.97,1.05);                                         // bright ring + shimmer spark

    win:()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>{ osc(f,0.24,'triangle',0.2); osc(f*2,0.2,'sine',0.05); },i*130)),
  };
  const BASS=[110,110,146.8,130.8], ARP=[440,523,659,523];
  function mnote(freq,dur,type,gain){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain(); o.type=type; o.frequency.value=freq;
    g.gain.value=0; g.gain.linearRampToValueAtTime(gain,actx.currentTime+0.02); g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur); o.connect(g); g.connect(musicGain); o.start(); o.stop(actx.currentTime+dur+0.02); }
  function startMusic(){ if(musicTimer) return; musicTimer=setInterval(()=>{ if(!actx||!cfg.musicOn) return; const t=musicStep%16;

  // ---- orchestral track manager (real files, procedural fallback) ----
  const TRACKFILE={ title:'title', forest1:'forest1', forest2:'forest2', forest3:'forest3', forest4:'forest4', frost1:'frost1', boss:'boss' };
  const audioTracks={}; let curTrackName=null, usingFile=false;
  function desiredTrack(){ if(scene!=='play') return 'title'; if(game&&game.mode==='endless') return 'boss'; if(game&&game.mode==='tutorial') return 'forest1'; return (game&&game.song)||'forest1'; }
  function playTrack(name){
    if(curTrackName===name) return; curTrackName=name;
    const file=TRACKFILE[name]||'title';
    for(const k in audioTracks){ if(k!==file){ try{ audioTracks[k].pause(); }catch(e){} } }
    let el=audioTracks[file];
    if(!el){ el=new Audio('audio/'+file+'.mp3'); el.loop=true; el.preload='auto'; el.dataset.ok='1'; el.addEventListener('error',()=>{ el.dataset.ok='0'; }); audioTracks[file]=el; }
    el.volume=cfg.musicOn?cfg.music:0;
    const p=el.play(); if(p&&p.then) p.then(()=>{ usingFile=true; if(musicGain) musicGain.gain.value=0; }).catch(()=>{});
  }
  function applyMusicVol(){ const v=cfg.musicOn?cfg.music:0; for(const k in audioTracks){ try{ audioTracks[k].volume=v; }catch(e){} } if(musicGain) musicGain.gain.value=usingFile?0:v; }
  function updateMusic(){ if(!actx) return; const d=desiredTrack(); if(d!==curTrackName) playTrack(d); }

  // ---- config persistence ----
  function saveCfg(){ try{ localStorage.setItem('ironclad',JSON.stringify({cfg,BIND,hi:HISCORE,endless:ENDLESS_BEST,disc:DISCOVERED,prog:PROGRESS,char:CHAR})); }catch(e){} }
  function loadCfg(){ try{ const s=JSON.parse(localStorage.getItem('ironclad')); if(s){ if(s.cfg) Object.assign(cfg,s.cfg); if(s.BIND) Object.assign(BIND,s.BIND); if(s.hi) HISCORE=s.hi; if(s.endless) ENDLESS_BEST=s.endless; if(s.disc) DISCOVERED=s.disc; if(s.prog) Object.assign(PROGRESS,s.prog); if(s.char){ CHAR=s.char; if(!CHAR.stats) CHAR.stats={vit:0,str:0,reach:0,guard:0,focus:0}; } } }catch(e){} }
  loadCfg();

  // ---- scene / menu state ----
  let scene='intro', menu={idx:0}, settingsFrom='title';

  const TITLEMENU=['START','LEVEL SELECT','CHARACTER','ENDLESS','TUTORIAL','BESTIARY','CONTROLS','SETTINGS'];

  function update(dt){
    if(scene==='play'){
      if(pressed.pause){ scene='pause'; menu.idx=0; SFX.select(); clearPressed(); return; }

  function menuUpdate(){
    const up=pressed.up,dn=pressed.down,lf=pressed.left,rt=pressed.right,ok=pressed.confirm||pressed.block||pressed.light,back=pressed.pause;
    if(scene==='intro'){ introT++; const anyKey=up||dn||lf||rt||ok||back||pressed.heavy||pressed.grab||pressed.reset;
      if(introT>250||anyKey){ scene='title'; menu.idx=0; } clearPressed(); return; }
    if(scene==='title'){ const n=TITLEMENU.length; if(up)menu.idx=(menu.idx+n-1)%n; if(dn)menu.idx=(menu.idx+1)%n; if(up||dn)SFX.select();
      if(ok){ SFX.select(); const s=TITLEMENU[menu.idx];

        else if(s==='CHARACTER'){ scene='character'; }

      if(up){ lsL=(lsL+worldLevelCount(lsW)-1)%worldLevelCount(lsW); SFX.select(); }
      if(dn){ lsL=(lsL+1)%worldLevelCount(lsW); SFX.select(); }

      if(back){ SFX.select(); scene='title'; menu.idx=1; } }
    else if(scene==='character'){ if(back||ok){ SFX.select(); scene='title'; menu.idx=2; } }
    else if(scene==='bestiary'){ const n=BEST.length; if(up||lf)menu.idx=(menu.idx+n-1)%n; if(dn||rt)menu.idx=(menu.idx+1)%n; if(up||dn||lf||rt)SFX.select(); if(back||pressed.confirm){ SFX.select(); scene='title'; menu.idx=3; } }
    else if(scene==='controls'){ if(ok||back){ SFX.select(); scene='title'; } }

    else if(scene==='settings'){ const n=SET.length; if(up)menu.idx=(menu.idx+n-1)%n; if(dn)menu.idx=(menu.idx+1)%n; if(up||dn)SFX.select();
      const dir=lf?-1:1;
      if(menu.idx===0&&(lf||rt)){ cfg.sfx=Math.max(0,Math.min(1,+(cfg.sfx+(rt?0.1:-0.1)).toFixed(2))); if(sfxGain)sfxGain.gain.value=cfg.sfx; SFX.select(); saveCfg(); }

      else if(menu.idx===6&&(lf||rt||ok)){ cfg.shake=cyc([1,0.5,0],cfg.shake,dir); SFX.select(); saveCfg(); }
      else if(menu.idx===7&&(lf||rt||ok)){ cfg.dmgnum=!cfg.dmgnum; SFX.select(); saveCfg(); }
      else if(menu.idx===8&&(lf||rt||ok)){ cfg.particles=cyc([1,0.5],cfg.particles,dir); SFX.select(); saveCfg(); }
      else if(menu.idx===9&&(lf||rt||ok)){ cfg.diff=cyc(['easy','normal','hard'],cfg.diff||'normal',dir); SFX.select(); saveCfg(); }
      else if(ok){ if(menu.idx>=2&&menu.idx<=5){ rebinding=RB[menu.idx-2]; SFX.select(); } else if(menu.idx===n-1){ SFX.select(); scene=settingsFrom; } }

    warp:(x)=>{ player.x=x; game.camX=Math.max(0,Math.min(LEN()-W,x-W*0.42)); },
    killAll:()=>{ enemies.forEach(e=>{e.hp=0;e.state='dead';e.deadT=80;}); },
    state:()=>({st:game.state,cam:Math.round(game.camX),lock:game.lock,gate:game.gateIdx,lvl:game.levelIdx,lvlName:game.levelName,lives:game.lives,
      player:{x:Math.round(player.x),hp:player.hp,st:player.state},
      enemies:enemies.map(e=>({t:e.type,x:Math.round(e.x),hp:e.hp,st:e.state}))}),
    cap:()=>cv.toDataURL('image/png')
  };
})();
</script>
</body>
</html>
